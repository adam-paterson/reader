<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Readrrr</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="icons/icon48.png" alt="Readrrr" class="logo">
      <h1>Readrrr</h1>
    </header>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Extracting article...</p>
    </div>

    <div id="content" class="content">
      <div id="article-info" class="article-info hidden">
        <h2 id="article-title" class="article-title"></h2>
        <p id="article-meta" class="article-meta"></p>
      </div>

      <div id="error-message" class="error-message hidden">
        <p>Could not extract article content. Try again or check the URL.</p>
      </div>

      <div class="actions">
        <button id="btn-read-now" class="btn btn-primary" disabled>
          <span class="btn-icon">📖</span>
          Read Now (RSVP)
        </button>
        <button id="btn-save-later" class="btn btn-secondary" disabled>
          <span class="btn-icon">🔖</span>
          Save for Later
        </button>
        <button id="btn-settings" class="btn btn-ghost">
          <span class="btn-icon">⚙️</span>
          Settings
        </button>
      </div>
    </div>

    <div id="settings-panel" class="settings-panel hidden">
      <h3>Settings</h3>
      <div class="form-group">
        <label for="api-url">Readrrr API URL</label>
        <input type="url" id="api-url" placeholder="https://api.readrrr.app">
      </div>
      <div class="form-group">
        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="Your API key">
      </div>
      <div class="form-actions">
        <button id="btn-save-settings" class="btn btn-primary">Save</button>
        <button id="btn-cancel-settings" class="btn btn-ghost">Cancel</button>
      </div>
    </div>

    <footer class="footer">
      <a href="#" id="link-help">Help</a>
      <span>•</span>
      <a href="#" id="link-feedback">Feedback</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
